{% extends "base.html" %}
{% block title %}Aprobar Trabajo Pendiente{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="card bg-dark text-white">
        <div class="card-header">
            <h4 class="mb-0">Aprobar Trabajo Pendiente</h4>
        </div>
        <div class="card-body">
            <form method="POST" action="{{ url_for('main.process_pending_job', job_id=job.id) }}">
                <div class="mb-3">
                    <label for="invoice_number" class="form-label">No. Factura</label>
                    <input type="text" 
                           class="form-control mobile-input" 
                           id="invoice_number" 
                           name="invoice_number" 
                           required 
                           value="{{ job.invoice_number if job.invoice_number else '' }}">
                </div>

                <div class="mb-3">
                    <label for="total_amount" class="form-label">Monto Total</label>
                    <div class="input-group">
                        <span class="input-group-text">RD$</span>
                        <input type="text" 
                               class="form-control mobile-input" 
                               id="total_amount" 
                               name="total_amount" 
                               required 
                               inputmode="numeric"
                               pattern="[0-9]*\.?[0-9]*"
                               value="{{ '%.2f'|format(job.total_amount|float) if job.total_amount is not none else '0.00' }}">
                    </div>
                </div>

                <div class="mb-3">
                    <label for="deposit_amount" class="form-label">Abono</label>
                    <div class="input-group">
                        <span class="input-group-text">RD$</span>
                        <input type="text" 
                               class="form-control mobile-input" 
                               id="deposit_amount" 
                               name="deposit_amount" 
                               required 
                               inputmode="numeric"
                               pattern="[0-9]*\.?[0-9]*"
                               value="{{ '%.2f'|format(job.deposit_amount|float) if job.deposit_amount is not none else '0.00' }}">
                    </div>
                </div>

                <div class="mb-3">
                    <label for="tags" class="form-label">Etiquetas (separadas por coma)</label>
                    <input type="text" 
                           class="form-control mobile-input" 
                           id="tags" 
                           name="tags" 
                           placeholder="Separadas por coma"
                           value="{{ job.tags if job.tags else '' }}">
                </div>

                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-success btn-lg">
                        <i class="bi bi-check-circle"></i> Aprobar Trabajo
                    </button>
                    <a href="{{ url_for('main.pending_verification') }}" class="btn btn-secondary">
                        <i class="bi bi-arrow-left"></i> Volver
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
