{% extends "base.html" %}

{% block title %}Escanear QR{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header">
                    <h4 class="mb-0">Escanear Código QR</h4>
                </div>
                <div class="card-body p-4">
                    <div class="text-center">
                        <!-- Opción de subir archivo -->
                        <label for="qrFile" class="btn btn-primary btn-lg mb-3">
                            <i class="bi bi-upload"></i> Subir QR desde Galería
                        </label>
                        <input type="file" id="qrFile" accept="image/*" style="display: none;" />

                        <!-- Vista previa de la imagen -->
                        <div id="preview" class="mt-3" style="display: none;">
                            <img id="imagePreview" class="img-fluid rounded mb-3" style="max-height: 300px;" />
                            <canvas id="canvas" style="display: none;"></canvas>
                        </div>
                    </div>
                    <div id="loadingIndicator" class="text-center py-3" style="display: none;">
                        <div class="spinner-border text-primary" role="status">
                            <span class="visually-hidden">Procesando...</span>
                        </div>
                        <p class="mt-2">Procesando código QR...</p>
                    </div>
                    <div id="successMessage" class="alert alert-success" style="display: none;">
                        Trabajo procesado exitosamente
                    </div>
                    <div id="errorMessage" class="alert alert-danger" style="display: none;">
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    const qrFileInput = document.getElementById('qrFile');
    const preview = document.getElementById('preview');
    const imagePreview = document.getElementById('imagePreview');
    const canvas = document.getElementById('canvas');
    const loadingIndicator = document.getElementById('loadingIndicator');
    const successMessage = document.getElementById('successMessage');
    const errorMessage = document.getElementById('errorMessage');

    // Función para procesar el resultado del QR
    async function processQrResult(decodedText) {
        try {
            loadingIndicator.style.display = 'block';
            successMessage.style.display = 'none';
            errorMessage.style.display = 'none';
            console.log('Texto decodificado:', decodedText);

            // Intentar parsear el QR
            let qrData;
            try {
                qrData = JSON.parse(decodedText);
            } catch (error) {
                // Si no es JSON, asumimos que es una URL o texto plano
                qrData = { qr_code: decodedText };
            }
            console.log('Datos del QR:', qrData);

            // Enviar los datos al servidor
            const response = await fetch('/process-qr', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(qrData)
            });

            const result = await response.json();
            console.log('Respuesta del servidor:', result);

            if (result.success) {
                successMessage.style.display = 'block';
                successMessage.textContent = result.message || 'Trabajo procesado exitosamente';
                setTimeout(() => {
                    if (result.redirect_url) {
                        window.location.href = result.redirect_url;
                    }
                }, 2000);
            } else {
                throw new Error(result.message || 'Error al procesar el código QR');
            }
        } catch (error) {
            console.error('Error detallado:', error);
            errorMessage.style.display = 'block';
            errorMessage.textContent = error.message || 'Error al procesar el código QR. Por favor, intente con otra imagen.';
        } finally {
            loadingIndicator.style.display = 'none';
        }
    }

    // Procesar imagen con jsQR
    function processImage(image) {
        const ctx = canvas.getContext('2d');
        canvas.width = image.width;
        canvas.height = image.height;
        ctx.drawImage(image, 0, 0);
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const code = jsQR(imageData.data, imageData.width, imageData.height);

        if (code) {
            console.log("¡Código QR encontrado!", code);
            processQrResult(code.data);
        } else {
            errorMessage.style.display = 'block';
            errorMessage.textContent = 'No se pudo detectar un código QR en la imagen. Por favor, intente con otra imagen.';
            loadingIndicator.style.display = 'none';
        }
    }

    // Manejar la subida de archivo
    if (qrFileInput) {
        qrFileInput.addEventListener('change', event => {
            if (event.target.files && event.target.files[0]) {
                const file = event.target.files[0];
                console.log('Archivo seleccionado:', file.name, file.type);

                // Mostrar preview de la imagen
                const reader = new FileReader();
                reader.onload = function(e) {
                    imagePreview.src = e.target.result;
                    preview.style.display = 'block';

                    // Crear una imagen para procesar con jsQR
                    const img = new Image();
                    img.onload = function() {
                        processImage(img);
                    };
                    img.src = e.target.result;
                }
                reader.readAsDataURL(file);
                loadingIndicator.style.display = 'block';
            }
        });
    }
});
</script>
{% endblock %}
