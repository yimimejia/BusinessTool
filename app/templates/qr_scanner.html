{% extends "base.html" %}

{% block title %}Escanear QR{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header">
                    <h4 class="mb-0">Escanear Código QR</h4>
                </div>
                <div class="card-body p-0">
                    <div id="video-container" style="position: relative; width: 100%; height: 80vh; max-height: 600px;">
                        <video id="qr-video" style="width: 100%; height: 100%; object-fit: cover;"></video>
                        <div id="scan-region-highlight" style="
                            position: absolute;
                            top: 50%;
                            left: 50%;
                            transform: translate(-50%, -50%);
                            width: 80%;
                            max-width: 300px;
                            height: 300px;
                            border: 2px solid rgba(255, 255, 255, 0.8);
                            border-radius: 12px;
                            box-shadow: 0 0 0 100vmax rgba(0, 0, 0, 0.3);
                            pointer-events: none;
                        "></div>
                        <div style="
                            position: absolute;
                            bottom: 20px;
                            left: 50%;
                            transform: translateX(-50%);
                            width: 100%;
                            text-align: center;
                            z-index: 1000;
                        ">
                            <button id="startButton" class="btn btn-primary btn-lg me-2">
                                <i class="bi bi-camera"></i> Iniciar Cámara
                            </button>
                            <button id="stopButton" class="btn btn-secondary btn-lg" style="display: none;">
                                <i class="bi bi-stop-circle"></i> Detener
                            </button>
                            <div class="mt-3">
                                <label for="qrFile" class="btn btn-info btn-lg">
                                    <i class="bi bi-upload"></i> Subir QR
                                </label>
                                <input type="file" id="qrFile" accept="image/*" style="display: none;" />
                            </div>
                        </div>
                    </div>
                    <div id="loadingIndicator" class="text-center py-3" style="display: none;">
                        <div class="spinner-border text-primary" role="status">
                            <span class="visually-hidden">Cargando...</span>
                        </div>
                        <p class="mt-2">Procesando código QR...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="https://unpkg.com/html5-qrcode"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    const html5QrCode = new Html5Qrcode("qr-video");
    const startButton = document.getElementById('startButton');
    const stopButton = document.getElementById('stopButton');
    const loadingIndicator = document.getElementById('loadingIndicator');
    const qrFileInput = document.getElementById('qrFile');
    let scanning = false;

    // Función para procesar el resultado del QR
    async function processQrResult(decodedText) {
        if (scanning) {
            scanning = false;
            loadingIndicator.style.display = 'block';

            try {
                // Intentar parsear el QR como JSON
                const qrData = JSON.parse(decodedText);

                // Enviar los datos al servidor
                const response = await fetch('/process-qr', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(qrData)
                });

                if (response.ok) {
                    const result = await response.json();
                    if (result.success) {
                        alert('Trabajo marcado como entregado exitosamente');
                        window.location.href = result.redirect_url;
                    } else {
                        alert(result.message || 'Error al procesar el código QR');
                        scanning = true;
                    }
                } else {
                    throw new Error('Error en la respuesta del servidor');
                }
            } catch (error) {
                console.error('Error procesando QR:', error);
                alert('Error al procesar el código QR. Por favor, intente nuevamente.');
                scanning = true;
            }

            loadingIndicator.style.display = 'none';
        }
    }

    startButton.addEventListener('click', async () => {
        try {
            const devices = await Html5Qrcode.getCameras();
            if (devices && devices.length) {
                startButton.style.display = 'none';
                stopButton.style.display = 'inline-block';
                scanning = true;

                const config = {
                    fps: 10,
                    qrbox: { width: 300, height: 300 },
                    aspectRatio: 1.0,
                    disableFlip: false,
                    videoConstraints: {
                        facingMode: { exact: "environment" }
                    }
                };

                await html5QrCode.start(
                    { facingMode: "environment" },
                    config,
                    processQrResult,
                    (error) => {
                        console.error('Error al escanear:', error);
                    }
                ).catch((err) => {
                    console.error("Error al iniciar la cámara:", err);
                    if (err.name === "NotAllowedError") {
                        alert("Por favor, permita el acceso a la cámara para escanear códigos QR.");
                    } else if (err.name === "NotFoundError") {
                        alert("No se encontró una cámara compatible en su dispositivo.");
                    } else {
                        alert("Error al iniciar la cámara. Por favor, intente nuevamente.");
                    }
                    startButton.style.display = 'inline-block';
                    stopButton.style.display = 'none';
                });
            } else {
                alert('No se encontró ninguna cámara en el dispositivo');
            }
        } catch (error) {
            console.error('Error al iniciar la cámara:', error);
            alert('Error al acceder a la cámara. Por favor, asegúrese de dar permiso de acceso.');
        }
    });

    stopButton.addEventListener('click', () => {
        html5QrCode.stop();
        startButton.style.display = 'inline-block';
        stopButton.style.display = 'none';
        scanning = false;
    });

    // Manejar la subida de archivo
    qrFileInput.addEventListener('change', event => {
        if (event.target.files && event.target.files[0]) {
            const file = event.target.files[0];
            scanning = true;

            html5QrCode.scanFile(file, true)
                .then(decodedText => {
                    processQrResult(decodedText);
                })
                .catch(err => {
                    alert('Error al leer el código QR de la imagen. Por favor, intente con otra imagen.');
                    console.error('Error al escanear archivo:', err);
                });
        }
    });
});
</script>
{% endblock %}
