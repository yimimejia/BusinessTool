{% extends "base.html" %}

{% block title %}Escanear QR{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header">
                    <h4 class="mb-0">Escanear Código QR</h4>
                </div>
                <div class="card-body p-4">
                    <div class="text-center">
                        <label for="qrFile" class="btn btn-primary btn-lg mb-3">
                            <i class="bi bi-upload"></i> Subir QR desde Galería
                        </label>
                        <input type="file" id="qrFile" accept="image/*" style="display: none;" />

                        <div id="preview" class="mt-3" style="display: none;">
                            <img id="imagePreview" class="img-fluid rounded mb-3" style="max-height: 300px;" />
                        </div>
                    </div>
                    <div id="loadingIndicator" class="text-center py-3" style="display: none;">
                        <div class="spinner-border text-primary" role="status">
                            <span class="visually-hidden">Procesando...</span>
                        </div>
                        <p class="mt-2">Procesando código QR...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="https://unpkg.com/html5-qrcode"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    const qrFileInput = document.getElementById('qrFile');
    const preview = document.getElementById('preview');
    const imagePreview = document.getElementById('imagePreview');
    const loadingIndicator = document.getElementById('loadingIndicator');
    let scanning = false;

    // Función para procesar el resultado del QR
    async function processQrResult(decodedText) {
        try {
            loadingIndicator.style.display = 'block';
            console.log('Texto decodificado:', decodedText);

            // Intentar parsear el QR como JSON
            const qrData = JSON.parse(decodedText);
            console.log('Datos del QR:', qrData);

            // Enviar los datos al servidor
            const response = await fetch('/process-qr', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(qrData)
            });

            const result = await response.json();
            console.log('Respuesta del servidor:', result);

            if (result.success) {
                alert('Trabajo marcado como entregado exitosamente');
                window.location.href = result.redirect_url;
            } else {
                throw new Error(result.message || 'Error al procesar el código QR');
            }
        } catch (error) {
            console.error('Error detallado:', error);
            alert(error.message || 'Error al procesar el código QR. Por favor, intente con otra imagen.');
        } finally {
            loadingIndicator.style.display = 'none';
        }
    }

    // Manejar la subida de archivo
    qrFileInput.addEventListener('change', event => {
        if (event.target.files && event.target.files[0]) {
            const file = event.target.files[0];
            console.log('Archivo seleccionado:', file.name, file.type);

            // Mostrar preview de la imagen
            const reader = new FileReader();
            reader.onload = function(e) {
                imagePreview.src = e.target.result;
                preview.style.display = 'block';
            }
            reader.readAsDataURL(file);

            // Configuración mejorada para el escaneo
            const qrConfig = {
                experimenteralFeatures: true,
                useBarCodeDetectorIfSupported: false,
                attemptCount: 10,
                formatsToSupport: ['qr_code']
            };

            // Crear nueva instancia para cada escaneo
            const html5QrCode = new Html5Qrcode("qrFile");
            loadingIndicator.style.display = 'block';

            html5QrCode.scanFile(file, true)
                .then(decodedText => {
                    console.log('QR escaneado exitosamente');
                    processQrResult(decodedText);
                })
                .catch(err => {
                    console.error('Error al escanear:', err);
                    alert('No se pudo leer el código QR. Por favor, asegúrese que la imagen sea clara y vuelva a intentar.');
                    loadingIndicator.style.display = 'none';
                });
        }
    });
});
</script>
{% endblock %}
