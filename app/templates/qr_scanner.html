{% extends "base.html" %}

{% block title %}Escanear QR{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header">
                    <h4 class="mb-0">Escanear Código QR</h4>
                </div>
                <div class="card-body p-4">
                    <div class="text-center">
                        <label for="qrFile" class="btn btn-primary btn-lg mb-3">
                            <i class="bi bi-upload"></i> Subir QR desde Galería
                        </label>
                        <input type="file" id="qrFile" accept="image/*" style="display: none;" />

                        <div id="preview" class="mt-3" style="display: none;">
                            <img id="imagePreview" class="img-fluid rounded mb-3" style="max-height: 300px;" />
                        </div>
                    </div>
                    <div id="loadingIndicator" class="text-center py-3" style="display: none;">
                        <div class="spinner-border text-primary" role="status">
                            <span class="visually-hidden">Procesando...</span>
                        </div>
                        <p class="mt-2">Procesando código QR...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="https://unpkg.com/html5-qrcode"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    const html5QrCode = new Html5Qrcode("qrFile");
    const loadingIndicator = document.getElementById('loadingIndicator');
    const qrFileInput = document.getElementById('qrFile');
    const preview = document.getElementById('preview');
    const imagePreview = document.getElementById('imagePreview');
    let scanning = false;

    // Función para procesar el resultado del QR
    async function processQrResult(decodedText) {
        if (scanning) {
            scanning = false;
            loadingIndicator.style.display = 'block';

            try {
                // Intentar parsear el QR como JSON
                const qrData = JSON.parse(decodedText);

                // Enviar los datos al servidor
                const response = await fetch('/process-qr', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(qrData)
                });

                if (response.ok) {
                    const result = await response.json();
                    if (result.success) {
                        alert('Trabajo marcado como entregado exitosamente');
                        window.location.href = result.redirect_url;
                    } else {
                        alert(result.message || 'Error al procesar el código QR');
                    }
                } else {
                    throw new Error('Error en la respuesta del servidor');
                }
            } catch (error) {
                console.error('Error procesando QR:', error);
                alert('Error al procesar el código QR. Por favor, intente con otra imagen.');
            }

            loadingIndicator.style.display = 'none';
            scanning = true;
        }
    }

    // Manejar la subida de archivo
    qrFileInput.addEventListener('change', event => {
        if (event.target.files && event.target.files[0]) {
            const file = event.target.files[0];

            // Mostrar preview de la imagen
            const reader = new FileReader();
            reader.onload = function(e) {
                imagePreview.src = e.target.result;
                preview.style.display = 'block';
            }
            reader.readAsDataURL(file);

            scanning = true;
            loadingIndicator.style.display = 'block';

            // Configurar opciones de escaneo más permisivas
            const config = {
                experimentalFeatures: {
                    useBarCodeDetectorIfSupported: false
                },
                formatsToSupport: ['qr_code'],
                verbose: true
            };

            html5QrCode.scanFile(file, true, config)
                .then(decodedText => {
                    processQrResult(decodedText);
                })
                .catch(err => {
                    console.error('Error al escanear archivo:', err);
                    alert('No se pudo leer el código QR. Por favor, asegúrese que la imagen sea clara y vuelva a intentar.');
                    loadingIndicator.style.display = 'none';
                });
        }
    });
});
</script>
{% endblock %}
