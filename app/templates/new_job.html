{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <h2>Nuevo Trabajo</h2>
    <form method="POST" class="mt-3">
        <div class="mb-3">
            <label for="description" class="form-label">Descripción del trabajo</label>
            <textarea class="form-control" id="description" name="description" required></textarea>
        </div>
        <div class="mb-3">
            <label for="client_name" class="form-label">Nombre del cliente</label>
            <input type="text" class="form-control" id="client_name" name="client_name" required>
        </div>
        <div class="mb-3">
            <label for="phone_number" class="form-label">Teléfono (solo números)</label>
            <input type="tel" class="form-control" id="phone_number" name="phone_number" pattern="[0-9]*" required>
        </div>
        <button type="submit" class="btn btn-primary">Registrar Trabajo</button>
    </form>
</div>
{% endblock %}
