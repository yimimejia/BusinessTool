{% extends "base.html" %}

{% block title %}Iniciar Sesión{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-4">
        <div class="card">
            <div class="card-header">
                <h4 class="mb-0">Iniciar Sesión</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label for="username" class="form-label">Usuario</label>
                        <input type="text" class="form-control" id="username" name="username" required>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Contraseña</label>
                        <input type="password" class="form-control" id="password" name="password" required>
                    </div>
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-key-fill"></i> Ingresar con Contraseña
                        </button>
                        <button type="button" id="biometricLogin" class="btn btn-success" style="display: none;">
                            <i class="bi bi-fingerprint"></i> Ingresar con Biometría
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/webauthn.js') }}"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    const biometricButton = document.getElementById('biometricLogin');

    // Verificar si el navegador soporta WebAuthn
    if (isWebAuthnSupported()) {
        biometricButton.style.display = 'block';
        biometricButton.addEventListener('click', async function(e) {
            e.preventDefault();
            try {
                await authenticateBiometric();
            } catch (error) {
                console.error('Error en autenticación biométrica:', error);
                alert('Error al intentar la autenticación biométrica. Por favor, intente con su contraseña.');
            }
        });
    }
});
</script>
{% endblock %}
