{% extends "base.html" %}

{% block title %}Nuevo Trabajo Pendiente{% endblock %}

{% block content %}
<div class="container">
    <div class="card">
        <div class="card-header">
            <h4 class="mb-0">Registrar Nuevo Trabajo Pendiente</h4>
        </div>
        <div class="card-body">
            <form method="POST" action="{{ url_for('main.new_pending_job') }}">
                <div class="row">
                    <div class="col-md-12 mb-3">
                        <label for="description" class="form-label">Descripción del Trabajo</label>
                        <textarea name="description" id="description" class="form-control" rows="3" required></textarea>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="client_name" class="form-label">Nombre del Cliente</label>
                        <input type="text" name="client_name" id="client_name" class="form-control" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="phone_number" class="form-label">Teléfono</label>
                        <input type="tel" name="phone_number" id="phone_number" class="form-control" placeholder="+1-XXX-XXXXXXX">
                        <small class="text-muted">Formato: +1-XXX-XXXXXXX</small>
                    </div>
                </div>
                <div class="text-end mt-3">
                    <a href="{{ url_for('main.dashboard') }}" class="btn btn-secondary me-2">Cancelar</a>
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-save"></i> Guardar Trabajo
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
