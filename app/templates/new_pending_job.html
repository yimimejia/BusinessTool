{% extends "base.html" %}

{% block title %}Nuevo Trabajo Pendiente{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header">
        <h4 class="mb-0">Registrar Nuevo Trabajo Pendiente</h4>
    </div>
    <div class="card-body">
        <form method="POST">
            <div class="row">
                <div class="col-md-12 mb-3">
                    <label class="form-label">Descripción</label>
                    <textarea name="description" class="form-control" rows="3" required></textarea>
                </div>
                <input type="hidden" name="designer_id" value="{{ current_user.id }}">
                <div class="col-md-4 mb-3">
                    <label class="form-label">Cliente</label>
                    <input type="text" name="client_name" class="form-control" required>
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Teléfono</label>
                    <input type="tel" name="phone_number" class="form-control" required>
                    <small class="text-muted">Formato: +1-XXX-XXXXXXX</small>
                </div>
            </div>
            <div class="text-end">
                <a href="{{ url_for('main.dashboard') }}" class="btn btn-secondary me-2">Cancelar</a>
                <button type="submit" class="btn btn-primary">Guardar Trabajo</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
