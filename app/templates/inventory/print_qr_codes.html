{% extends "base.html" %}

{% block title %}Imprimir Códigos QR{% endblock %}

{% block content %}
<div class="qr-print-container">
    {% for category, items in items_by_category.items() %}
    <div class="category-section">
        <h3 class="category-title">{{ category }}</h3>
        <div class="qr-grid">
            {% for item in items %}
            <div class="qr-item">
                <img src="data:image/png;base64,{{ item.qr_code }}" alt="QR {{ item.name }}" class="qr-code">
                <div class="item-name">{{ item.name }}</div>
            </div>
            {% endfor %}
        </div>
    </div>
    {% endfor %}
</div>

<style>
@media print {
    body {
        margin: 0;
        padding: 0;
    }
    .qr-print-container {
        padding: 2px;
    }
    .category-section {
        break-inside: avoid;
        margin-bottom: 10px;
    }
    .category-title {
        font-size: 14px;
        margin-bottom: 3px;
        padding: 2px 4px;
        background: #f8f9fa;
        border-left: 3px solid #0d6efd;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }
    .qr-grid {
        display: grid;
        grid-template-columns: repeat(6, 1fr);
        gap: 3px;
    }
    .qr-item {
        text-align: center;
        padding: 2px;
        border: 1px solid #dee2e6;
        border-radius: 2px;
    }
    .qr-code {
        width: 60px;
        height: 60px;
        margin-bottom: 1px;
    }
    .item-name {
        font-size: 8px;
        margin-top: 1px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        padding: 0 1px;
    }
}
</style>
{% endblock %}
