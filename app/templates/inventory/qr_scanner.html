{% extends "base.html" %}

{% block title %}Escanear QR{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header">
                    <h4 class="mb-0">
                        <i class="bi bi-qr-code-scan"></i> Escanear Código QR
                    </h4>
                </div>
                <div class="card-body p-4">
                    <div class="text-center">
                        <div id="reader" class="mb-3"></div>
                        <div id="result"></div>
                    </div>
                    <div class="alert alert-info">
                        <i class="bi bi-info-circle"></i> Apunte la cámara hacia el código QR del artículo para retirar una unidad.
                    </div>
                    <!-- Mensajes de estado -->
                    <div id="statusMessage" class="alert" style="display: none;"></div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
{{ super() }}
<script src="https://unpkg.com/html5-qrcode"></script>
<script>
function showStatus(message, type = 'info') {
    const statusDiv = document.getElementById('statusMessage');
    statusDiv.className = `alert alert-${type}`;
    statusDiv.textContent = message;
    statusDiv.style.display = 'block';
}

async function onScanSuccess(decodedText, decodedResult) {
    try {
        showStatus('Procesando...', 'info');

        // Detener temporalmente el escáner
        html5QrcodeScanner.pause();

        const response = await fetch(decodedText);
        if (!response.ok) {
            throw new Error(`Error HTTP: ${response.status}`);
        }

        const data = await response.json();

        if (data.success) {
            showStatus(`${data.message}`, 'success');
            setTimeout(() => {
                // Redirigir usando window.location.replace para evitar problemas con la descarga
                window.location.replace(data.redirect);
            }, 2000);
        } else {
            showStatus(data.message, 'danger');
            setTimeout(() => {
                showStatus('Listo para escanear', 'info');
                html5QrcodeScanner.resume();
            }, 3000);
        }
    } catch (error) {
        console.error('Error:', error);
        showStatus('Error al procesar el código QR. Por favor, intente nuevamente.', 'danger');
        setTimeout(() => {
            showStatus('Listo para escanear', 'info');
            html5QrcodeScanner.resume();
        }, 3000);
    }
}

function onScanError(errorMessage) {
    console.error(errorMessage);
}

// Configurar el escáner
let html5QrcodeScanner = new Html5QrcodeScanner(
    "reader", 
    { 
        fps: 10,
        qrbox: 250,
        aspectRatio: 1.0,
        supportedScanTypes: [Html5QrcodeScanType.SCAN_TYPE_CAMERA]
    }
);
html5QrcodeScanner.render(onScanSuccess, onScanError);

// Mostrar mensaje inicial
showStatus('Listo para escanear', 'info');
</script>

<style>
#reader {
    width: 100%;
    max-width: 600px;
    margin: 0 auto;
}
#reader video {
    width: 100% !important;
    border-radius: 8px;
}
#html5-qrcode-button-camera-permission {
    background-color: var(--bs-primary) !important;
    border: none !important;
    padding: 10px 20px !important;
    border-radius: 4px !important;
    color: white !important;
    margin: 10px 0 !important;
}
</style>
{% endblock %}
