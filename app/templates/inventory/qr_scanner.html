{% extends "base.html" %}

{% block title %}Escanear QR{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow">
                <div class="card-header">
                    <h4 class="mb-0">
                        <i class="bi bi-qr-code-scan"></i> Escanear Código QR
                    </h4>
                </div>
                <div class="card-body">
                    <div class="text-center mb-3">
                        <div id="reader" class="mb-3"></div>
                        <div id="result"></div>
                    </div>
                    <div class="alert alert-info">
                        <i class="bi bi-info-circle"></i> Apunte la cámara hacia el código QR del artículo para retirar una unidad.
                    </div>
                    <!-- Mensajes de estado -->
                    <div id="statusMessage" class="alert" style="display: none;"></div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
{{ super() }}
<script src="https://unpkg.com/html5-qrcode"></script>
<script>
function showStatus(message, type = 'info') {
    const statusDiv = document.getElementById('statusMessage');
    statusDiv.className = `alert alert-${type}`;
    statusDiv.textContent = message;
    statusDiv.style.display = 'block';
}

function handleScanResult(response) {
    if (response.success) {
        showStatus(response.message, 'success');
        setTimeout(() => {
            window.location.href = response.redirect;
        }, 2000);
    } else {
        showStatus(response.message, 'danger');
        // Reiniciar el escáner después de 3 segundos
        setTimeout(() => {
            showStatus('Listo para escanear', 'info');
            html5QrcodeScanner.render(onScanSuccess, onScanError);
        }, 3000);
    }
}

async function onScanSuccess(decodedText, decodedResult) {
    // Detener el escáner temporalmente
    html5QrcodeScanner.pause();

    try {
        showStatus('Procesando...', 'info');
        const response = await fetch(decodedText);
        const data = await response.json();
        handleScanResult(data);
    } catch (error) {
        console.error('Error:', error);
        showStatus('Error al procesar el código QR', 'danger');
        // Reiniciar el escáner después de 3 segundos
        setTimeout(() => {
            showStatus('Listo para escanear', 'info');
            html5QrcodeScanner.render(onScanSuccess, onScanError);
        }, 3000);
    }
}

function onScanError(errorMessage) {
    console.error(errorMessage);
}

// Configurar el escáner
let html5QrcodeScanner = new Html5QrcodeScanner(
    "reader", 
    { 
        fps: 10,
        qrbox: 250,
        aspectRatio: 1.0,
        supportedScanTypes: [Html5QrcodeScanType.SCAN_TYPE_CAMERA]
    }
);
html5QrcodeScanner.render(onScanSuccess, onScanError);

// Mostrar mensaje inicial
showStatus('Listo para escanear', 'info');
</script>

<style>
#reader {
    width: 100%;
    max-width: 600px;
    margin: 0 auto;
}
#reader video {
    width: 100% !important;
    border-radius: 8px;
}
#html5-qrcode-button-camera-permission {
    background-color: var(--bs-primary) !important;
    border: none !important;
    padding: 10px 20px !important;
    border-radius: 4px !important;
    color: white !important;
    margin: 10px 0 !important;
}
</style>
{% endblock %}
