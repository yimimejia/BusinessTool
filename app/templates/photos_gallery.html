
{% extends "base.html" %}
{% block content %}
<div class="container mt-4">
    <h1 class="text-center mb-4">Fotos de su trabajo</h1>
    {% if expired %}
    <div class="alert alert-warning">
        Este enlace ha expirado.
    </div>
    {% else %}
    <div class="row">
        {% for photo in photos %}
        <div class="col-md-4 mb-4">
            <div class="card">
                <img src="{{ url_for('static', filename=photo) }}" class="card-img-top" alt="Foto">
            </div>
        </div>
        {% endfor %}
    </div>
    {% endif %}
</div>
{% endblock %}
