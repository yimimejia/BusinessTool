{% extends "base.html" %}
{% block content %}
<div class="container mt-4">
    <h1 class="text-center mb-4">Fotos de su trabajo</h1>
    {% if expired %}
    <div class="alert alert-warning">
        Este enlace ha expirado.
    </div>
    {% else %}
    <div class="text-center mb-4">
        <button class="btn btn-primary" onclick="downloadAllPhotos()">
            <i class="bi bi-download"></i> Descargar todas las fotos
        </button>
    </div>
    <div class="row">
        {% for photo in photos %}
        <div class="col-md-4 mb-4">
            <div class="card">
                <img src="{{ url_for('static', filename=photo) }}" class="card-img-top img-fluid" alt="Foto del trabajo">
                <div class="card-body">
                    <a href="{{ url_for('static', filename=photo) }}" 
                       class="btn btn-sm btn-outline-primary" 
                       download>
                        <i class="bi bi-download"></i> Descargar
                    </a>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
    {% endif %}
</div>
{% endblock %}

{% block scripts %}
<script>
async function downloadAllPhotos() {
    const photos = {{ photos|tojson|safe }};
    for (const photo of photos) {
        const link = document.createElement('a');
        const response = await fetch("{{ url_for('static', filename='') }}" + photo);
        const blob = await response.blob();
        link.href = window.URL.createObjectURL(blob);
        link.download = photo.split('/').pop(); // Get filename from path
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        await new Promise(resolve => setTimeout(resolve, 500)); // Small delay between downloads
    }
}
</script>
{% endblock %}
